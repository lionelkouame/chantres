api_platform:
    title: 'Chantres API'
    version: '1.0.0'
    formats:
        jsonld: ['application/ld+json']
        json:   ['application/json']
    docs_formats:
        jsonld: ['application/ld+json']
        json:   ['application/json']
        html:   ['text/html']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization']
    use_symfony_listeners: true
    mapping:
        paths:
            - '%kernel.project_dir%/src/Shared/Infrastructure/Api/Resource'
